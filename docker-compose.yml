version: "3.9"

services:

  backend:
    build: .
    container_name: multi-agent-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app

    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  streamlit:
    build: .
    container_name: multi-agent-streamlit

    ports:
      - "8501:8501"

    env_file:
      - .env

    volumes:
      - .:/app

    command: streamlit run streamlit_app.py --server.port 8501